<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Prediction | MyCarPrediction</title>
    <link rel="stylesheet" href="Predict.css">
</head>
<body>

<div class="container">

    <!-- Left Info Section -->
    <div class="info-section">
        <h1>Used Car Price Prediction</h1>
        <p>
            Our intelligent system uses Machine Learning algorithms 
            to estimate the accurate market price of your car 
            based on real-world data.
        </p>

        <ul>
            <li>✔ AI Powered Model</li>
            <li>✔ Accurate Market Estimation</li>
            <li>✔ Instant Prediction</li>
            <li>✔ Data Driven Results</li>
        </ul>
    </div>

    <!-- Prediction Form -->
    <div class="form-section">
        <h2>Enter Car Details</h2>

        <form id="predictionForm">
            <input type="text" name="Car_Name" placeholder="Car Brand (e.g., BMW)" required>
            <input type="number" name="Year" placeholder="Manufacturing Year" required>
            <input type="number" name="Kms_Driven" placeholder="Kilometers Driven" required>
            <select name="Owner" required>
                <option value="">Select Owner</option>
                <option value="First Owner">First Owner</option>
                <option value="Second Owner">Second Owner</option>
                <option value="Third Owner">Third Owner</option>
                <option value="Fourth & Above Owner">Fourth & Above Owner</option>
                <option value="Test Drive Car">Test Drive Car</option>
            </select>
            <select name="Fuel_Type" required>
                <option value="">Fuel Type</option>
                <option value="Petrol">Petrol</option>
                <option value="Diesel">Diesel</option>
                <option value="CNG">CNG</option>
                <option value="Electric">Electric</option>
                <option value="LPG">LPG</option>
            </select>
            <select name="Seller_Type" required>
                <option value="">Seller Type</option>
                <option value="Individual">Individual</option>
                <option value="Trustmark Dealer">Trustmark Dealer</option>
            </select>
            <select name="Transmission" required>
                <option value="">Transmission</option>
                <option value="Manual">Manual</option>
                <option value="Automatic">Automatic</option>
            </select>

            <button type="submit">Predict Price</button>
        </form>

        <div id="result"></div>
    </div>

</div>

<script src="Predict.js"></script>
</body>
</html>
